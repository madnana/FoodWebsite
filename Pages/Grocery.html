<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List</title>

    <link rel="stylesheet" href="BigProject.css">
</head>

<body class="grocery-page">

    <nav>
        <ul>
            <li><a href="MealPlan.html">Meal Planner</a></li>
            <li><a href="Grocery.html">Grocery List</a></li>
            <li><a href="Recipes.html">Recipes</a></li> 
            <li><a href="exercise.html">Exercise</a></li>
            <li><a href="habits.html">Habit Tracker</a></li>
        </ul>
    </nav>

    <section class="grocery-section">
        <h2>Grocery List</h2>

        <div class="grocery-category">
            <h3>🥬 Produce</h3>
            <label><input type="checkbox"><span>Tomatoes</span></label>
            <label><input type="checkbox"><span>Onion</span></label>
            <label><input type="checkbox"><span>Garlic</span></label>
            <label><input type="checkbox"><span>Lettuce</span></label>
            <label><input type="checkbox"><span>Banana</span></label>
            <label><input type="checkbox"><span>Avocado</span></label>
        </div>

        <div class="grocery-category">
            <h3>🥩 Proteins</h3>
            <label><input type="checkbox"><span>Chicken Breast</span></label>
            <label><input type="checkbox"><span>Ground Beef</span></label>
            <label><input type="checkbox"><span>Eggs</span></label>
            <label><input type="checkbox"><span>Black Beans (Feijão)</span></label>
        </div>

        <div class="grocery-category">
            <h3>🧀 Dairy</h3>
            <label><input type="checkbox"><span>Milk</span></label>
            <label><input type="checkbox"><span>Cheese (Queijo)</span></label>
            <label><input type="checkbox"><span>Greek Yogurt</span></label>
            <label><input type="checkbox"><span>Butter</span></label>
        </div>

        <div class="grocery-category">
            <h3>🌾 Grains & Pantry</h3>
            <label><input type="checkbox"><span>Rice</span></label>
            <label><input type="checkbox"><span>Farofa</span></label>
            <label><input type="checkbox"><span>Pasta</span></label>
            <label><input type="checkbox"><span>Bread (Pão francês)</span></label>
            <label><input type="checkbox"><span>Tortillas</span></label>
        </div>

        <div class="grocery-category">
            <h3>🍫 Snacks</h3>
            <label><input type="checkbox"><span>Granola Bars</span></label>
            <label><input type="checkbox"><span>Chocolate</span></label>
            <label><input type="checkbox"><span>Peanut Butter</span></label>
            <label><input type="checkbox"><span>Chips</span></label>
        </div>
    </section>

</body>
</html>
